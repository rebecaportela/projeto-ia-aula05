<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Detector de Emoções</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f8d7ff, #d8e7ff);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #241133;
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.82);
      border-radius: 24px;
      padding: 26px;
      text-align: center;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.18);
    }

    h1 {
      font-size: 30px;
      margin-bottom: 8px;
      color: #5f2b8c;
    }

    p {
      font-size: 15px;
      color: #5f526b;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .camera-box {
      width: 260px;
      height: 260px;
      margin: 0 auto 16px;
      background: #f3e8ff;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #7c5b9a;
      font-weight: bold;
    }

    canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 14px;
    }

    button:hover {
      transform: scale(1.02);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      background: #ffffff;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .result small {
      display: block;
      color: #7c6c8f;
      margin-bottom: 6px;
    }

    .emotion {
      font-size: 28px;
      font-weight: bold;
      color: #7e22ce;
    }

    .confidence {
      font-size: 18px;
      color: #ec4899;
      margin-top: 4px;
      font-weight: bold;
    }

    .labels {
      display: grid;
      gap: 8px;
      text-align: left;
    }

    .label-item {
      background: #f3e8ff;
      border-radius: 12px;
      padding: 10px;
      font-size: 14px;
      color: #4c1d70;
    }

    .label-item.active {
      background: linear-gradient(135deg, #a855f7, #ec4899);
      color: white;
      font-weight: bold;
    }

    .note {
      margin-top: 14px;
      font-size: 12px;
      color: #7c6c8f;
    }

    @media (max-width: 420px) {
      .camera-box {
        width: 230px;
        height: 230px;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>

  <div class="app">
    <h1>Detector de Emoções</h1>

    <p>
      Clique no botão, permita a câmera e mostre uma expressão para o sistema analisar.
    </p>

    <div class="camera-box" id="webcam-container">
      Câmera
    </div>

    <button id="startBtn">Iniciar teste</button>

    <div class="result">
      <small>Expressão detectada</small>
      <div class="emotion" id="mainEmotion">--</div>
      <div class="confidence" id="mainConfidence">0%</div>
    </div>

    <div class="labels" id="label-container"></div>

    <div class="note">
      Observação: o sistema reconhece padrões visuais treinados no modelo, não sentimentos reais com precisão absoluta.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

  <script>
    const MODEL_URL = "./models/emotions/";

    let model;
    let webcam;
    let labelContainer;
    let maxPredictions;

    const startBtn = document.getElementById("startBtn");
    const webcamContainer = document.getElementById("webcam-container");
    const mainEmotion = document.getElementById("mainEmotion");
    const mainConfidence = document.getElementById("mainConfidence");

    startBtn.addEventListener("click", init);

    async function init() {
      startBtn.disabled = true;
      startBtn.innerText = "Carregando...";

      try {
        model = await tmImage.load(
          MODEL_URL + "model.json",
          MODEL_URL + "metadata.json"
        );

        maxPredictions = model.getTotalClasses();

        webcam = new tmImage.Webcam(260, 260, true);
        await webcam.setup();
        await webcam.play();

        webcamContainer.innerHTML = "";
        webcamContainer.appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
          const div = document.createElement("div");
          div.className = "label-item";
          div.innerText = "-";
          labelContainer.appendChild(div);
        }

        startBtn.innerText = "Rodando";
        window.requestAnimationFrame(loop);

      } catch (error) {
        console.error(error);
        startBtn.disabled = false;
        startBtn.innerText = "Tentar novamente";
        alert("Não foi possível iniciar. Verifique se o modelo está na pasta correta e se a câmera foi permitida.");
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const predictions = await model.predict(webcam.canvas);

      let highestIndex = 0;

      predictions.forEach((prediction, index) => {
        if (prediction.probability > predictions[highestIndex].probability) {
          highestIndex = index;
        }
      });

      predictions.forEach((prediction, index) => {
        const percent = prediction.probability * 100;
        const text = `${prediction.className}: ${percent.toFixed(1)}%`;

        const item = labelContainer.children[index];
        item.innerText = text;
        item.classList.remove("active");

        if (index === highestIndex) {
          item.classList.add("active");
        }
      });

      const dominant = predictions[highestIndex];
      mainEmotion.innerText = dominant.className;
      mainConfidence.innerText = (dominant.probability * 100).toFixed(1) + "%";
    }
  </script>

</body>
</html>
