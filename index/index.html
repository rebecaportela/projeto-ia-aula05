<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconhecimento - Rebeca</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilo customizado -->
    <style>
        body {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-custom {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .btn-camera {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }

        .btn-camera:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        canvas {
            border-radius: 15px;
            width: 100% !important;
            height: auto !important;
        }

        .progress {
            height: 20px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .label-text {
            font-size: 14px;
            margin-bottom: 3px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card-custom text-center">

        <h2 class="mb-3">👁️ Reconhecimento</h2>
        <p class="mb-4">Clique no botão para ativar a câmera</p>

        <button class="btn btn-camera mb-4" onclick="init()">🎥 Ativar Câmera</button>

        <div id="webcam-container" class="mb-4"></div>

        <div id="label-container" class="text-start"></div>

    </div>
</div>

<!-- TensorFlow + Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
    const URL = "./my_model/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(300, 300, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
            const wrapper = document.createElement("div");

            const label = document.createElement("div");
            label.className = "label-text";

            const progress = document.createElement("div");
            progress.className = "progress";

            const progressBar = document.createElement("div");
            progressBar.className = "progress-bar progress-bar-striped progress-bar-animated";
            progressBar.style.width = "0%";

            progress.appendChild(progressBar);
            wrapper.appendChild(label);
            wrapper.appendChild(progress);

            labelContainer.appendChild(wrapper);
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);

        for (let i = 0; i < maxPredictions; i++) {
            const prob = prediction[i].probability;
            const percent = (prob * 100).toFixed(1);

            const wrapper = labelContainer.childNodes[i];
            const label = wrapper.childNodes[0];
            const progressBar = wrapper.childNodes[1].childNodes[0];

            label.innerHTML = `${prediction[i].className}: ${percent}%`;
            progressBar.style.width = percent + "%";
        }
    }
</script>

</body>
</html>
